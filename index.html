<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>승또 6/45</title>
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/wcAAwAB/8ZZvFkAAAAASUVORK5CYII="
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
      /* CSS 변수 지정 */
      :root {
        --color-ball-1: #e4a816; /* 1~10번 */
        --color-ball-2: #1994da; /* 11~20번 */
        --color-ball-3: #e86352; /* 21~30번 */
        --color-ball-4: #8f8f8f; /* 31~40번 */
        --color-ball-5: #5bb544; /* 41~45번 */
        --color-text-main: #333;
        --color-bg-light: #f5f5f5;
        --color-white: #fff;
      }

      #container {
        padding: 30px 0 10px;
      }
      .section_qr .winner_number {
        text-align: center;
      }
      .section_qr .footer_f {
        text-align: center;
        position: absolute;
        left: 0px;
        right: 0px;
        bottom: 10px;
      }
      .section_qr .winner_number h3 {
        font-size: 50px;
        color: var(--color-text-main);
        letter-spacing: -0.025em;
      }
      .section_qr .footer_f button {
        font-size: 20px;
        font-weight: 700;
        width: 300px;
        height: 50px;
      }
      .section_qr .winner_number .bx_winner {
        margin-top: 22px;
      }
      .section_qr .winner_number .bx_winner .lotto .list {
        padding-top: 13px;
        /* Flexbox 사용으로 레이아웃 개선 */
        display: flex;
        justify-content: center;
        gap: 3px;
      }
      .section_qr .winner_number .bx_winner .lotto .list .clr {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 40px;
        height: 40px;
        font-weight: 700;
        font-size: 28px;
        color: var(--color-white);
        letter-spacing: -0.025em;
        border-radius: 100%;
      }
      /* 공통 색상 적용 */
      .section_qr .winner_number .bx_winner .lotto .list .clr1 {
        background: var(--color-ball-1);
      }
      .section_qr .winner_number .bx_winner .lotto .list .clr2 {
        background: var(--color-ball-2);
      }
      .section_qr .winner_number .bx_winner .lotto .list .clr3 {
        background: var(--color-ball-3);
      }
      .section_qr .winner_number .bx_winner .lotto .list .clr4 {
        background: var(--color-ball-4);
      }
      .section_qr .winner_number .bx_winner .lotto .list .clr5 {
        background: var(--color-ball-5);
      }

      .bx_add_msg {
        position: relative;
        padding: 22px 22px;
        background: var(--color-bg-light);
        text-align: center;
        /* Flexbox 사용 */
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bx_add_msg .info {
        width: calc(100% - 53px);
        margin-top: -3px;
        padding-left: 19px;
      }
    </style>
  </head>
  <body>
    <section id="container" class="section_qr">
      <div class="winner_number">
        <h2><strong>승또 6/45</strong></h2>
        <div class="bx_winner">
          <div class="lotto"></div>
        </div>
      </div>
      <br />
      <br />
      <br />
      <footer class="footer_f">
        <button type="button" class="btn btn-success" id="btnLottoLink">로또당첨번호 바로가기</button>
        <br />
        <br />
        <button type="button" class="btn btn-success" id="btnGetLotto">조회하기</button>
      </footer>
    </section>

    <script>
      // 전역 로또 히스토리 (비동기로 채워질 예정)
      let lottoHistory = new Set();

      // 설정 상수화
      const LOTTO_CONFIG = {
        COUNT: 6,
        MAX_NUMBER: 45,
        TICKETS_PER_VIEW: 5,
        MAX_ATTEMPTS: 10000,
      };

      /**
       * 외부 JSON 파일로부터 과거 당첨 내역 로드
       */
      async function fetchLottoHistory() {
        try {
          const response = await fetch("./lotto_history.json");
          const data = await response.json();
          lottoHistory = new Set(data);
        } catch (error) {
          console.error("과거 내역을 불러오는데 실패했습니다:", error);
        }
      }

      /**
       * 로또 번호 생성 및 화면 출력 함수 (성능 최적화 버전)
       * @param {number} times - 생성할 횟수
       */
      const getLotto = (times) => {
        const lottoContainer = document.querySelector(".lotto");
        if (!lottoContainer) return;

        lottoContainer.innerHTML = ""; // 기존 번호 초기화

        // DOM 렌더링 최적화를 위한 DocumentFragment 생성
        const fragment = document.createDocumentFragment();
        const generated = [];
        let attempts = 0;

        while (generated.length < times && attempts < LOTTO_CONFIG.MAX_ATTEMPTS) {
          attempts++;
          const lotto = new Set();
          while (lotto.size < LOTTO_CONFIG.COUNT) {
            const num = Math.floor(Math.random() * LOTTO_CONFIG.MAX_NUMBER) + 1;
            lotto.add(num);
          }

          // [최적화 1] 정렬을 1회만 수행하여 변수에 캐싱
          const sortedLotto = Array.from(lotto).sort((a, b) => a - b);
          const key = sortedLotto.join(",");

          // [최적화 2] Set 객체의 빠른 O(1) 조회 성능을 활용한 중복 검사
          if (!lottoHistory.has(key)) {
            generated.push(sortedLotto);
            lottoHistory.add(key);
          }
        }

        // [최적화 3] DocumentFragment에 임시 노드를 추가하여 단 한 번만 DOM 반영
        generated.forEach((lotto) => {
          const listDiv = document.createElement("div");
          listDiv.className = "list";

          listDiv.innerHTML = lotto
            .map((num) => {
              const colorClass = `clr${Math.min(5, Math.ceil(num / 10))}`;
              return `<div class="animate__animated animate__rollIn clr ${colorClass}"><span>${num}</span></div>`;
            })
            .join("");

          fragment.appendChild(listDiv);
        });

        // 실제 브라우저 화면(DOM)에는 최종적으로 단 1회만 노드 삽입
        lottoContainer.appendChild(fragment);
      };

      /**
       * DOM 로드 완료 후 초기화
       */
      document.addEventListener("DOMContentLoaded", async () => {
        // 과거 데이터 로드 후 첫 로또 생성
        await fetchLottoHistory();
        getLotto(LOTTO_CONFIG.TICKETS_PER_VIEW);

        // 로또당첨번호 바로가기 버튼
        const naverLottoUrl =
          "https://m.search.naver.com/search.naver?sm=mtp_hty.top&where=m&query=%EB%A1%9C%EB%98%90%EB%8B%B9%EC%B2%A8%EB%B2%88%ED%98%B8";
        document.getElementById("btnLottoLink").addEventListener("click", () => {
          window.open(naverLottoUrl);
        });

        // 조회하기 버튼 (번호 재생성)
        document.getElementById("btnGetLotto").addEventListener("click", () => {
          getLotto(LOTTO_CONFIG.TICKETS_PER_VIEW);
        });
      });
    </script>
  </body>
</html>
